      <ul class="sidebar-nav">

              <rect x="14" y="3" width="7" height="7" />

            </svg>
            Dashboard
          </a></li>
        <li><a href="/analyze.html">
            <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

            History

              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
            </svg>
            Discussion Rooms

        <li><a href="/profile.html">

              <line x1="12" y1="16" x2="12" y2="12" />

      <div style="margin-top:auto;padding-top:2rem">
        <a href="#" data-logout class="btn btn-ghost btn-sm btn-full">Sign Out</a>
      </div>
    </aside>
    <main class="main-content">
      <div class="page-title">Analysis History</div>
      <p class="page-subtitle">All your previous code analyses</p>
      <div class="card" style="padding:0;overflow:hidden">
        <div id="historyList" style="padding:1.5rem">
          <div class="skeleton" style="height:48px;margin-bottom:0.5rem;border-radius:var(--radius-sm)"></div>
          <div class="skeleton" style="height:48px;margin-bottom:0.5rem;border-radius:var(--radius-sm)"></div>
          <div class="skeleton" style="height:48px;border-radius:var(--radius-sm)"></div>
        </div>
      </div>
    </main>
  </div>
  <script src="js/app.js"></script>
  <script>
    Auth.requireAuth();
    const ICONS = { python: "🐍", java: "☕", c: "⚙️", cpp: "🔧", unknown: "📄" };

    async function load() {
      const { ok, data } = await API.get("/api/analysis/history?limit=50");
      const list = document.getElementById("historyList");
      const analyses = data?.analyses || [];
      if (!analyses.length) {
        list.innerHTML = `<div class="empty-state"><div class="empty-icon">📝</div><p>No analyses yet</p><a href="/analyze.html" class="btn btn-primary">Analyze Your First Code</a></div>`;
        return;
      }
      list.innerHTML = `<table class="history-table" style="font-size:0.875rem">
        <thead><tr><th>Language</th><th>Grade</th><th>Errors</th><th>Confidence</th><th>Date</th><th>Actions</th></tr></thead>
        <tbody>${analyses.map(a => `
          <tr>
            <td><span style="font-size:1.2rem">${ICONS[a.language] || "📄"}</span> ${a.language.toUpperCase()}</td>
            <td><span class="grade-badge grade-${a.grade}">${a.grade}</span></td>
            <td>${a.syntax_errors}</td>
            <td style="font-family:var(--font-mono)">${(a.confidence * 100).toFixed(0)}%</td>
            <td style="color:var(--text-muted)">${formatDate(a.created_at)}</td>
            <td style="display:flex;gap:0.5rem">
              <a href="/analyze.html?id=${a.id}" class="btn btn-ghost btn-sm">View</a>
              <button class="btn btn-danger btn-sm" onclick="deleteAnalysis('${a.id}',this)">Delete</button>
            </td>
          </tr>`).join("")}
        </tbody></table>`;
    }

    async function deleteAnalysis(id, btn) {
      if (!confirm("Delete this analysis?")) return;
      btn.disabled = true;
      const { ok } = await API.delete(`/api/analysis/${id}`);
      if (ok) { Toast.success("Deleted"); load(); }
      else { Toast.error("Failed to delete"); btn.disabled = false; }
    }

    load();
  </script>
</body>

</html>
