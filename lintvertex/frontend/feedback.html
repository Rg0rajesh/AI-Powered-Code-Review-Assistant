<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedback – LintVertex</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    .stars {
      display: flex;
      gap: 0.5rem;
      margin: 0.5rem 0 1rem;
    }

    .star {
      font-size: 2rem;
      cursor: pointer;
      transition: transform 0.1s ease;
      filter: grayscale(1) opacity(0.4);
    }

    .star.active {
      filter: none;
      transform: scale(1.15);
    }

    .star:hover {
      transform: scale(1.2);
      filter: none;
    }
  </style>
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar">
    <a href="/index.html" class="logo-text">Lint<span>Vertex</span></a>
    <ul class="nav-links">
      <li><span data-user-name style="color:var(--text-secondary);font-size:0.875rem"></span></li>
    </ul>
    <div style="display:flex;align-items:center;gap:0.75rem">
      <div class="theme-toggle">
        <span class="theme-label">☀️</span>
        <button class="toggle-track">
          <div class="toggle-thumb"></div>
        </button>
      </div>

      <a href="/notifications.html" class="notif-bell" data-notif-count="0" title="Notifications">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
          <path d="M13.73 21a2 2 0 0 1-3.46 0" />
        </svg>
        <span class="notif-badge" style="display:none">0</span>
      </a>

      <a href="#" data-logout class="btn btn-ghost btn-sm">Logout</a>
    </div>
  </nav>

  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1.5rem;padding:0 0.25rem">
        <div id="sidebarAvatar"
          style="width:36px;height:36px;border-radius:50%;background:var(--accent-light);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.8rem;overflow:hidden;flex-shrink:0">
        </div>
        <div>
          <div style="font-weight:700;font-size:0.875rem" data-user-name></div>
          <div style="font-size:0.7rem;color:var(--text-muted)" id="sidebarRole"></div>
        </div>
      </div>

      <ul class="sidebar-nav">
        <li><a href="/dashboard.html">
            <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7" />
              <rect x="14" y="3" width="7" height="7" />
              <rect x="3" y="14" width="7" height="7" />
              <rect x="14" y="14" width="7" height="7" />
            </svg>
            Dashboard
          </a></li>
        <li><a href="/analyze.html">
            <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="16 18 22 12 16 6" />
              <polyline points="8 6 2 12 8 18" />
            </svg>
            Code Analysis
          </a></li>
        <li><a href="/history.html">
            <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10" />
              <polyline points="12 6 12 12 16 14" />
            </svg>
            History
          </a></li>
        <li><a href="/rooms.html">
            <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
            </svg>
            Discussion Rooms
          </a></li>
        <li><a href="/profile.html">
            <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            Profile
          </a></li>
        <li><a href="/feedback.html" class="active">
            <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
            </svg>
            Feedback
          </a></li>
        <li><a href="/about.html">
            <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="16" x2="12" y2="12" />
              <line x1="12" y1="8" x2="12.01" y2="8" />
            </svg>
            About Us
          </a></li>
        <li class="admin-only" style="display:none"><a href="/admin.html">
            <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            </svg>
            Admin Panel
          </a></li>
      </ul>

      <div style="margin-top:auto;padding-top:2rem">
        <a href="#" data-logout class="btn btn-ghost btn-sm btn-full">Sign Out</a>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-title">Share Feedback</div>
      <p class="page-subtitle">Help us improve LintVertex</p>
      <div class="card" style="max-width:560px">
        <form id="feedbackForm">
          <div class="form-group">
            <label class="form-label">Overall Rating</label>
            <div class="stars" id="starRow">
              <span class="star" data-val="1">⭐</span>
              <span class="star" data-val="2">⭐</span>
              <span class="star" data-val="3">⭐</span>
              <span class="star" data-val="4">⭐</span>
              <span class="star" data-val="5">⭐</span>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Your Feedback</label>
            <textarea class="form-input" id="feedbackText" rows="5"
              placeholder="What do you love? What could be better? Any feature requests?"></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="submitFb">Submit Feedback</button>
        </form>
      </div>
    </main>
  </div>
  <script src="js/app.js"></script>
  <script>
    Auth.requireAuth();
    let selectedRating = 0;

    document.querySelectorAll(".star").forEach(star => {
      star.addEventListener("click", () => {
        selectedRating = parseInt(star.dataset.val);
        document.querySelectorAll(".star").forEach((s, i) => {
          s.classList.toggle("active", i < selectedRating);
        });
      });
    });

    document.getElementById("feedbackForm").addEventListener("submit", async e => {
      e.preventDefault();
      if (!selectedRating) { Toast.warning("Please select a rating"); return; }
      const text = document.getElementById("feedbackText").value.trim();
      if (!text) { Toast.warning("Please write your feedback"); return; }

      const btn = document.getElementById("submitFb");
      btn.disabled = true; btn.innerHTML = '<div class="spinner"></div> Submitting...';

      const { ok, data } = await API.post("/api/feedback/submit", { rating: selectedRating, feedback_text: text });
      btn.disabled = false; btn.innerHTML = "Submit Feedback";

      if (ok) {
        Toast.success("Thank you for your feedback! 🎉");
        document.getElementById("feedbackText").value = "";
        selectedRating = 0;
        document.querySelectorAll(".star").forEach(s => s.classList.remove("active"));
      } else {
        Toast.error(data.error || "Failed to submit");
      }
    });
  </script>
</body>

</html>
