<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>500 – Server Error · LintVertex</title>
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    .error-wrap {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 580px;
    }

    /* Shake the whole scene periodically */
    .scene {
      width: 340px;
      height: 280px;
      margin: 0 auto 2rem;
      position: relative;
      animation: sceneShake 4s ease-in-out infinite;
    }

    @keyframes sceneShake {

      0%,
      90%,
      100% {
        transform: none;
      }

      92% {
        transform: translateX(-4px) rotate(-0.5deg);
      }

      94% {
        transform: translateX(4px) rotate(0.5deg);
      }

      96% {
        transform: translateX(-3px);
      }

      98% {
        transform: translateX(3px);
      }
    }

    /* Ground */
    .ground {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 36px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
    }

    /* Server tower */
    .server-wrap {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
    }

    /* Smoke puffs */
    .smoke {
      position: absolute;
      border-radius: 50%;
      background: var(--text-muted);
      opacity: 0;
      animation: smokeRise ease-out infinite;
    }

    @keyframes smokeRise {
      0% {
        transform: translateY(0) scale(0.3);
        opacity: 0.5;
      }

      100% {
        transform: translateY(-80px) scale(2);
        opacity: 0;
      }
    }

    /* Sparks */
    .spark {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
      animation: sparkFly ease-out infinite;
    }

    @keyframes sparkFly {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
      }

      100% {
        transform: translate(var(--sx), var(--sy)) scale(0);
        opacity: 0;
      }
    }

    /* Wrench flying */
    .wrench {
      position: absolute;
      font-size: 1.5rem;
      animation: wrenchFly 2.5s ease-in-out infinite;
    }

    @keyframes wrenchFly {
      0% {
        transform: translate(0, 0) rotate(0deg);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      100% {
        transform: translate(-80px, -60px) rotate(-360deg);
        opacity: 0;
      }
    }

    /* Error text */
    .error-code {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--error, #c0392b);
      margin-bottom: 0.75rem;
    }

    .error-title {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 0.75rem;
    }

    .error-body {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.65;
      margin-bottom: 2rem;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
    }

    .error-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* Reload counter */
    .auto-retry {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 1rem;
      font-family: var(--font-mono);
    }

    .auto-retry strong {
      color: var(--accent);
    }

    /* Orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      background: var(--error, #c0392b);
      opacity: 0.04;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div class="orb" style="width:400px;height:400px;top:-120px;left:-100px"></div>
  <div class="orb" style="width:250px;height:250px;bottom:-80px;right:-50px"></div>

  <nav class="navbar">
    <a href="/index.html" class="logo-text">Lint<span>Vertex</span></a>
    <div class="theme-toggle"><span class="theme-label">☀️</span><button class="toggle-track">
        <div class="toggle-thumb"></div>
      </button></div>
  </nav>

  <div class="error-wrap">
    <div class="scene" id="scene">

      <!-- Flying wrench -->
      <div class="wrench" style="right:30px;top:90px;animation-delay:0.5s">🔧</div>
      <div class="wrench" style="right:50px;top:70px;animation-delay:1.8s;font-size:1rem">⚙️</div>

      <!-- Smoke puffs from top of server -->
      <div class="smoke" style="width:20px;height:20px;left:148px;top:30px;animation-duration:2s;animation-delay:0s">
      </div>
      <div class="smoke"
        style="width:14px;height:14px;left:162px;top:35px;animation-duration:2.4s;animation-delay:0.6s"></div>
      <div class="smoke"
        style="width:18px;height:18px;left:138px;top:38px;animation-duration:1.8s;animation-delay:1.1s"></div>

      <!-- Sparks -->
      <div class="spark"
        style="left:165px;top:100px;animation-duration:0.8s;animation-delay:0s;--sx:20px;--sy:-30px;background:var(--accent)">
      </div>
      <div class="spark"
        style="left:155px;top:110px;animation-duration:0.6s;animation-delay:0.3s;--sx:-25px;--sy:-20px;background:var(--warning,#e67e22)">
      </div>
      <div class="spark" style="left:175px;top:105px;animation-duration:0.9s;animation-delay:0.7s;--sx:15px;--sy:-40px">
      </div>

      <!-- Server SVG -->
      <div class="server-wrap">
        <svg width="120" height="180" viewBox="0 0 120 180" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Server body - slightly tilted from explosion -->
          <g transform="rotate(-3, 60, 90)">
            <!-- Crack/explosion effect -->
            <path d="M55 65 L62 80 L57 80 L64 95" stroke="var(--error,#c0392b)" stroke-width="2.5" fill="none"
              stroke-linecap="round" opacity="0.8">
              <animate attributeName="opacity" values="0.8;0.3;0.8" dur="0.4s" repeatCount="indefinite" />
            </path>

            <!-- Server rack top -->
            <rect x="10" y="20" width="100" height="36" rx="6" fill="var(--bg-card)" stroke="var(--border)"
              stroke-width="2" />
            <!-- Status light - blinking red -->
            <circle cx="22" cy="38" r="5" fill="var(--error,#c0392b)">
              <animate attributeName="opacity" values="1;0.1;1" dur="0.4s" repeatCount="indefinite" />
            </circle>
            <!-- Disk activity -->
            <rect x="32" y="32" width="50" height="4" rx="2" fill="var(--bg-secondary)" stroke="var(--border)"
              stroke-width="1" />
            <rect x="32" y="32" width="15" height="4" rx="2" fill="var(--error,#c0392b)">
              <animate attributeName="width" values="15;45;15" dur="0.8s" repeatCount="indefinite" />
            </rect>
            <circle cx="94" cy="35" r="3" fill="var(--accent)" opacity="0.6">
              <animate attributeName="opacity" values="0.6;0.1;0.6" dur="0.6s" repeatCount="indefinite" begin="0.2s" />
            </circle>

            <!-- Server rack middle -->
            <rect x="10" y="62" width="100" height="36" rx="6" fill="var(--bg-card)" stroke="var(--error,#c0392b)"
              stroke-width="2" />
            <!-- MELTING indicator light lol -->
            <circle cx="22" cy="80" r="5" fill="var(--warning,#e67e22)">
              <animate attributeName="r" values="5;7;5" dur="0.5s" repeatCount="indefinite" />
            </circle>
            <!-- Display showing gibberish -->
            <rect x="32" y="72" width="60" height="16" rx="3" fill="var(--bg-secondary)" stroke="var(--border)"
              stroke-width="1" />
            <text x="36" y="83" font-size="7" font-family="monospace" fill="var(--error,#c0392b)">ERR_0x4F2!</text>

            <!-- Server rack bottom -->
            <rect x="10" y="104" width="100" height="36" rx="6" fill="var(--bg-card)" stroke="var(--border)"
              stroke-width="2" />
            <circle cx="22" cy="122" r="5" fill="var(--bg-secondary)" stroke="var(--border)" stroke-width="1.5" />
            <!-- Fan (spinning confused) -->
            <circle cx="60" cy="122" r="10" fill="var(--bg-secondary)" stroke="var(--border)" stroke-width="1.5">
              <animateTransform attributeName="transform" type="rotate" values="0,60,122;360,60,122" dur="0.3s"
                repeatCount="indefinite" />
            </circle>
            <line x1="60" y1="112" x2="60" y2="132" stroke="var(--border)" stroke-width="1.5" transform-origin="60 122">
              <animateTransform attributeName="transform" type="rotate" values="0,60,122;360,60,122" dur="0.3s"
                repeatCount="indefinite" additive="sum" />
            </line>
            <line x1="50" y1="122" x2="70" y2="122" stroke="var(--border)" stroke-width="1.5" transform-origin="60 122">
              <animateTransform attributeName="transform" type="rotate" values="0,60,122;360,60,122" dur="0.3s"
                repeatCount="indefinite" additive="sum" />
            </line>
            <!-- Power indicator -->
            <circle cx="95" cy="122" r="4" fill="var(--error,#c0392b)">
              <animate attributeName="opacity" values="1;0;1" dur="0.3s" repeatCount="indefinite" />
            </circle>

            <!-- Cables hanging out -->
            <path d="M25 140 Q20 155 15 165" stroke="var(--accent)" stroke-width="3" fill="none" stroke-linecap="round"
              opacity="0.6">
              <animate attributeName="d" values="M25 140 Q20 155 15 165;M25 140 Q22 155 18 165;M25 140 Q20 155 15 165"
                dur="1s" repeatCount="indefinite" />
            </path>
            <path d="M40 140 Q38 157 35 168" stroke="var(--success,#27ae60)" stroke-width="3" fill="none"
              stroke-linecap="round" opacity="0.5">
              <animate attributeName="d" values="M40 140 Q38 157 35 168;M40 140 Q42 157 38 168;M40 140 Q38 157 35 168"
                dur="1.3s" repeatCount="indefinite" />
            </path>
          </g>

          <!-- Sad face overlay on the middle rack -->
          <g transform="rotate(-3, 60, 90)">
            <circle cx="48" cy="76" r="3" fill="var(--error,#c0392b)" opacity="0.5" />
            <circle cx="72" cy="76" r="3" fill="var(--error,#c0392b)" opacity="0.5" />
            <path d="M50 86 Q60 82 70 86" stroke="var(--error,#c0392b)" stroke-width="1.5" fill="none" opacity="0.5" />
          </g>
        </svg>
      </div>

      <!-- Ground -->
      <div class="ground"></div>
    </div>

    <p class="error-code">Error 500 — Internal Server Error</p>
    <h1 class="error-title">Something exploded 💥</h1>
    <p class="error-body">
      Our servers are having a rough day. The engineers have been notified
      and our little robot army is already on the case. We'll be back up soon!
    </p>

    <div class="error-actions">
      <button class="btn btn-primary btn-lg" onclick="retryPage()">🔄 Try Again</button>
      <a href="/dashboard.html" class="btn btn-ghost btn-lg">🏠 Dashboard</a>
    </div>

    <div class="auto-retry" id="retryInfo">
      Auto-retrying in <strong id="retryCount">30</strong>s
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    function retryPage() { window.location.reload(); }

    let count = 30;
    const retryEl = document.getElementById("retryCount");
    const interval = setInterval(() => {
      count--;
      retryEl.textContent = count;
      if (count <= 0) {
        clearInterval(interval);
        retryPage();
      }
    }, 1000);
  </script>
</body>

</html>
