<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>404 – Page Not Found · LintVertex</title>
  <link rel="stylesheet" href="/css/main.css"/>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
      position: relative;
    }

    /* Floating stars background */
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star {
      position: absolute;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.18;
      animation: twinkle ease-in-out infinite;
    }
    @keyframes twinkle {
      0%,100% { opacity: 0.08; transform: scale(1); }
      50%      { opacity: 0.3;  transform: scale(1.4); }
    }

    .error-wrap {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 560px;
    }

    /* ── 404 Giant Text ── */
    .big-num {
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 800;
      letter-spacing: -0.06em;
      line-height: 1;
      color: var(--accent);
      opacity: 0.12;
      position: absolute;
      top: -2rem;
      left: 50%;
      transform: translateX(-50%);
      user-select: none;
      white-space: nowrap;
    }

    /* ── Scene ── */
    .scene {
      position: relative;
      width: 320px;
      height: 280px;
      margin: 0 auto 2rem;
    }

    /* ── Ground ── */
    .ground {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 40px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .ground-line {
      position: absolute;
      height: 2px;
      background: var(--border);
      top: 50%;
      animation: groundScroll 2s linear infinite;
    }
    .ground-line:nth-child(1) { width:40px; left:10%;  animation-delay:0s; }
    .ground-line:nth-child(2) { width:24px; left:35%;  animation-delay:0.5s; }
    .ground-line:nth-child(3) { width:32px; left:60%;  animation-delay:1s; }
    .ground-line:nth-child(4) { width:20px; left:82%;  animation-delay:1.5s; }

    @keyframes groundScroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-320px); }
    }

    /* ── Robot ── */
    .robot {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      animation: robotWalk 0.5s ease-in-out infinite alternate,
                 robotDrift 4s ease-in-out infinite;
    }

    @keyframes robotWalk {
      from { transform: translateX(-50%) translateY(0); }
      to   { transform: translateX(-50%) translateY(-4px); }
    }

    @keyframes robotDrift {
      0%,100% { left: 45%; }
      50%      { left: 55%; }
    }

    /* Robot SVG parts */
    .robot-body  { width: 80px; display: block; position: relative; }

    /* Head antenna */
    .antenna {
      position: absolute;
      width: 3px; height: 16px;
      background: var(--accent);
      top: -16px; left: 50%;
      transform: translateX(-50%);
      border-radius: 2px;
      animation: antennaBlink 1.2s ease-in-out infinite;
    }
    .antenna::after {
      content: "";
      position: absolute;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      top: -5px; left: -2.5px;
      animation: antennaBlink 1.2s ease-in-out infinite;
    }
    @keyframes antennaBlink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.2; }
    }

    /* ── Floating question marks ── */
    .q-mark {
      position: absolute;
      font-family: var(--font-mono);
      font-weight: 800;
      color: var(--accent);
      animation: qFloat linear infinite;
      opacity: 0;
    }

    @keyframes qFloat {
      0%   { transform: translateY(0)  scale(0.5); opacity: 0; }
      10%  { opacity: 0.7; }
      80%  { opacity: 0.5; }
      100% { transform: translateY(-100px) scale(1.1); opacity: 0; }
    }

    /* ── Map / Paper ── */
    .map {
      position: absolute;
      right: 20px;
      bottom: 44px;
      width: 56px;
      height: 44px;
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: 4px;
      animation: mapWave 2s ease-in-out infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      box-shadow: var(--shadow-sm);
    }

    @keyframes mapWave {
      0%,100% { transform: rotate(-5deg) translateY(0); }
      50%      { transform: rotate(5deg)  translateY(-4px); }
    }

    .map-line {
      position: absolute;
      height: 2px;
      background: var(--border);
      border-radius: 1px;
    }

    /* ── Content ── */
    .error-code {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }

    .error-title {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 0.75rem;
    }

    .error-body {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.65;
      margin-bottom: 2rem;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    .error-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* Fun floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.05;
      pointer-events: none;
      animation: orbFloat ease-in-out infinite;
    }
    @keyframes orbFloat {
      0%,100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-30px) scale(1.05); }
    }
  </style>
</head>
<body>

  <!-- Stars bg -->
  <div class="stars" id="stars"></div>

  <!-- Floating orbs -->
  <div class="orb" style="width:300px;height:300px;top:-100px;left:-80px;animation-duration:8s;animation-delay:0s"></div>
  <div class="orb" style="width:200px;height:200px;bottom:-60px;right:-40px;animation-duration:6s;animation-delay:-3s"></div>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="/index.html" class="logo-text">Lint<span>Vertex</span></a>
    <div class="theme-toggle">
      <span class="theme-label">☀️</span>
      <button class="toggle-track"><div class="toggle-thumb"></div></button>
    </div>
  </nav>

  <div class="error-wrap">
    <div class="big-num">404</div>

    <!-- Scene -->
    <div class="scene">

      <!-- Question marks floating up -->
      <div class="q-mark" style="font-size:1.5rem;left:30%;top:60px;animation-duration:2.5s;animation-delay:0s">?</div>
      <div class="q-mark" style="font-size:1rem;left:55%;top:80px;animation-duration:3s;animation-delay:0.8s">?</div>
      <div class="q-mark" style="font-size:1.25rem;left:20%;top:70px;animation-duration:2.8s;animation-delay:1.6s">?</div>

      <!-- Robot SVG -->
      <div class="robot">
        <div class="antenna"></div>
        <svg width="80" height="120" viewBox="0 0 80 120" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Head -->
          <rect x="15" y="0" width="50" height="42" rx="10" fill="var(--bg-card)" stroke="var(--border)" stroke-width="2"/>
          <!-- Head shine -->
          <rect x="20" y="5" width="16" height="6" rx="3" fill="var(--accent)" opacity="0.15"/>
          <!-- Eyes -->
          <rect x="22" y="12" width="12" height="10" rx="3" fill="var(--bg-secondary)" stroke="var(--border)" stroke-width="1.5"/>
          <rect x="46" y="12" width="12" height="10" rx="3" fill="var(--bg-secondary)" stroke="var(--border)" stroke-width="1.5"/>
          <!-- Pupils - animated looking around -->
          <circle cx="29" cy="17" r="3" fill="var(--accent)">
            <animate attributeName="cx" values="27;31;27" dur="2s" repeatCount="indefinite"/>
          </circle>
          <circle cx="53" cy="17" r="3" fill="var(--accent)">
            <animate attributeName="cx" values="51;55;51" dur="2s" repeatCount="indefinite"/>
          </circle>
          <!-- Mouth - confused squiggle -->
          <path d="M28 34 Q32 30 40 34 Q48 38 52 34" stroke="var(--border)" stroke-width="2" fill="none" stroke-linecap="round"/>
          <!-- Cheeks -->
          <circle cx="20" cy="32" r="5" fill="var(--accent)" opacity="0.1"/>
          <circle cx="60" cy="32" r="5" fill="var(--accent)" opacity="0.1"/>
          <!-- Neck -->
          <rect x="32" y="42" width="16" height="8" rx="2" fill="var(--bg-secondary)" stroke="var(--border)" stroke-width="1.5"/>
          <!-- Body -->
          <rect x="10" y="50" width="60" height="44" rx="10" fill="var(--bg-card)" stroke="var(--border)" stroke-width="2"/>
          <!-- Body panel -->
          <rect x="22" y="60" width="36" height="22" rx="4" fill="var(--bg-secondary)" stroke="var(--border)" stroke-width="1.5"/>
          <!-- Panel lights -->
          <circle cx="30" cy="68" r="3" fill="var(--accent)" opacity="0.7">
            <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1s" repeatCount="indefinite"/>
          </circle>
          <circle cx="40" cy="68" r="3" fill="var(--accent)" opacity="0.4">
            <animate attributeName="opacity" values="0.4;0.9;0.4" dur="1.3s" repeatCount="indefinite"/>
          </circle>
          <circle cx="50" cy="68" r="3" fill="var(--accent)" opacity="0.9">
            <animate attributeName="opacity" values="0.9;0.3;0.9" dur="0.8s" repeatCount="indefinite"/>
          </circle>
          <!-- Panel bar -->
          <rect x="26" y="76" width="28" height="3" rx="1.5" fill="var(--border)"/>
          <!-- Left arm (scratching head) -->
          <rect x="-4" y="54" width="16" height="10" rx="5" fill="var(--bg-card)" stroke="var(--border)" stroke-width="2">
            <animate attributeName="y" values="54;46;54" dur="1.5s" repeatCount="indefinite"/>
          </rect>
          <!-- Right arm -->
          <rect x="68" y="54" width="16" height="10" rx="5" fill="var(--bg-card)" stroke="var(--border)" stroke-width="2"/>
          <!-- Legs -->
          <rect x="20" y="94" width="16" height="24" rx="6" fill="var(--bg-card)" stroke="var(--border)" stroke-width="2">
            <animate attributeName="y" values="94;90;94" dur="0.5s" repeatCount="indefinite"/>
          </rect>
          <rect x="44" y="94" width="16" height="24" rx="6" fill="var(--bg-card)" stroke="var(--border)" stroke-width="2">
            <animate attributeName="y" values="94;98;94" dur="0.5s" repeatCount="indefinite"/>
          </rect>
          <!-- Feet -->
          <rect x="16" y="115" width="22" height="8" rx="4" fill="var(--bg-secondary)" stroke="var(--border)" stroke-width="1.5"/>
          <rect x="42" y="115" width="22" height="8" rx="4" fill="var(--bg-secondary)" stroke="var(--border)" stroke-width="1.5"/>
        </svg>
      </div>

      <!-- Map (lost!) -->
      <div class="map">
        🗺️
      </div>

      <!-- Ground -->
      <div class="ground">
        <div class="ground-line"></div>
        <div class="ground-line"></div>
        <div class="ground-line"></div>
        <div class="ground-line"></div>
      </div>
    </div>

    <!-- Text -->
    <p class="error-code">Error 404</p>
    <h1 class="error-title">Oops! Page not found</h1>
    <p class="error-body">
      Our little robot searched everywhere but couldn't find this page.
      It might have been moved, deleted, or maybe it never existed at all.
    </p>

    <div class="error-actions">
      <a href="/dashboard.html" class="btn btn-primary btn-lg">🏠 Go Home</a>
      <a href="javascript:history.back()" class="btn btn-ghost btn-lg">← Go Back</a>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    // Spawn twinkling stars
    const stars = document.getElementById("stars");
    for (let i = 0; i < 30; i++) {
      const s = document.createElement("div");
      s.className = "star";
      const size = Math.random() * 6 + 2;
      s.style.cssText = `
        width:${size}px;height:${size}px;
        top:${Math.random()*100}%;left:${Math.random()*100}%;
        animation-duration:${Math.random()*3+2}s;
        animation-delay:${Math.random()*3}s;`;
      stars.appendChild(s);
    }
  </script>
</body>
</html>
