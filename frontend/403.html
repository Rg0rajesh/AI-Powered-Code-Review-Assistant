<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>403 – Access Forbidden · LintVertex</title>
  <link rel="stylesheet" href="/css/main.css"/>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    .error-wrap { position:relative; z-index:1; text-align:center; max-width:560px; }

    /* Diagonal warning stripes at top */
    .danger-stripe {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 6px;
      background: repeating-linear-gradient(
        90deg,
        var(--accent) 0px, var(--accent) 20px,
        transparent 20px, transparent 40px
      );
      opacity: 0.5;
      animation: stripeScroll 1s linear infinite;
    }
    @keyframes stripeScroll {
      from { background-position: 0 0; }
      to   { background-position: 40px 0; }
    }

    /* Scene */
    .scene {
      width: 300px;
      height: 260px;
      margin: 0 auto 2rem;
      position: relative;
    }

    /* Ground */
    .ground {
      position: absolute;
      bottom: 0; left:0; right:0;
      height: 36px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
    }

    /* Guard */
    .guard {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      animation: guardSway 2s ease-in-out infinite;
    }
    @keyframes guardSway {
      0%,100% { transform: translateX(-50%) rotate(-1deg); }
      50%      { transform: translateX(-50%) rotate(1deg); }
    }

    /* NO sign bouncing */
    .no-sign {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--bg-card);
      border: 4px solid var(--error, #c0392b);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: noBounce 0.8s cubic-bezier(0.36,0.07,0.19,0.97) infinite;
      box-shadow: 0 0 20px rgba(192,57,43,0.15);
    }
    .no-sign::after {
      content: "";
      position: absolute;
      width: 3px;
      height: 54px;
      background: var(--error, #c0392b);
      border-radius: 2px;
      transform: rotate(45deg);
    }
    @keyframes noBounce {
      0%,100% { transform: translateX(-50%) scale(1); }
      10%      { transform: translateX(-50%) scale(0.95) rotate(-5deg); }
      30%      { transform: translateX(-50%) scale(1.08) rotate(3deg); }
      60%      { transform: translateX(-50%) scale(0.97) rotate(-2deg); }
    }

    /* Warning flash */
    .warn-flash {
      position: absolute;
      top: 8px; right: 20px;
      animation: warnFlash 1s ease-in-out infinite;
      font-size: 2rem;
    }
    @keyframes warnFlash {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.3; transform:scale(0.9); }
    }

    /* Shaking exclamation marks */
    .exclaim {
      position: absolute;
      font-family: var(--font-mono);
      font-weight: 800;
      font-size: 1.5rem;
      color: var(--error, #c0392b);
      animation: exclShake ease-in-out infinite;
    }
    @keyframes exclShake {
      0%,100% { transform:rotate(-10deg) translateY(0); opacity:0.6; }
      50%      { transform:rotate(10deg) translateY(-8px); opacity:1; }
    }

    /* Error info */
    .error-code { font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.14em;color:var(--error,#c0392b);margin-bottom:0.75rem; }
    .error-title { font-size:clamp(1.5rem,4vw,2rem);font-weight:800;letter-spacing:-0.03em;margin-bottom:0.75rem; }
    .error-body  { color:var(--text-secondary);font-size:0.95rem;line-height:1.65;margin-bottom:2rem;max-width:400px;margin-left:auto;margin-right:auto; }
    .error-actions { display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap; }

    /* Orbs */
    .orb { position:fixed;border-radius:50%;background:var(--error,#c0392b);opacity:0.04;pointer-events:none;animation:orbF ease-in-out infinite; }
    @keyframes orbF { 0%,100%{transform:scale(1);}50%{transform:scale(1.1);} }
  </style>
</head>
<body>
  <div class="danger-stripe"></div>

  <div class="orb" style="width:350px;height:350px;top:-100px;right:-80px;animation-duration:7s"></div>
  <div class="orb" style="width:200px;height:200px;bottom:-50px;left:-40px;animation-duration:5s;animation-delay:-2s"></div>

  <nav class="navbar">
    <a href="/index.html" class="logo-text">Lint<span>Vertex</span></a>
    <div class="theme-toggle"><span class="theme-label">☀️</span><button class="toggle-track"><div class="toggle-thumb"></div></button></div>
  </nav>

  <div class="error-wrap">
    <div class="scene">

      <!-- Exclamation marks -->
      <div class="exclaim" style="left:18%;top:50px;animation-duration:1.4s;animation-delay:0s">!</div>
      <div class="exclaim" style="right:18%;top:40px;animation-duration:1.8s;animation-delay:0.5s;font-size:1rem">!</div>

      <!-- NO sign -->
      <div class="no-sign"></div>

      <!-- Guard SVG -->
      <div class="guard">
        <svg width="90" height="160" viewBox="0 0 90 160" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Hat -->
          <rect x="22" y="0" width="46" height="10" rx="3" fill="var(--bg-secondary)" stroke="var(--border)" stroke-width="2"/>
          <rect x="28" y="10" width="34" height="8" rx="2" fill="var(--accent)" opacity="0.7"/>
          <!-- Head -->
          <rect x="24" y="18" width="42" height="36" rx="10" fill="var(--bg-card)" stroke="var(--border)" stroke-width="2"/>
          <!-- Sunglasses -->
          <rect x="28" y="26" width="13" height="9" rx="3" fill="var(--text-primary)" opacity="0.85"/>
          <rect x="49" y="26" width="13" height="9" rx="3" fill="var(--text-primary)" opacity="0.85"/>
          <line x1="41" y1="30" x2="49" y2="30" stroke="var(--text-primary)" stroke-width="2" opacity="0.85"/>
          <!-- Stern mouth -->
          <line x1="34" y1="44" x2="56" y2="44" stroke="var(--border)" stroke-width="2.5" stroke-linecap="round"/>
          <!-- Cheeks blush (angry) -->
          <circle cx="30" cy="41" r="4" fill="var(--error,#c0392b)" opacity="0.15"/>
          <circle cx="60" cy="41" r="4" fill="var(--error,#c0392b)" opacity="0.15"/>
          <!-- Neck -->
          <rect x="36" y="54" width="18" height="8" rx="3" fill="var(--bg-secondary)" stroke="var(--border)" stroke-width="1.5"/>
          <!-- Body (uniform) -->
          <rect x="12" y="62" width="66" height="50" rx="10" fill="var(--accent)" opacity="0.9"/>
          <!-- Badge -->
          <rect x="34" y="70" width="22" height="16" rx="3" fill="var(--bg-primary)" stroke="var(--bg-secondary)" stroke-width="1.5"/>
          <text x="45" y="80" text-anchor="middle" font-size="6" font-weight="bold" fill="var(--accent)" font-family="monospace">GUARD</text>
          <!-- Belt -->
          <rect x="12" y="104" width="66" height="8" rx="3" fill="var(--bg-secondary)" stroke="var(--border)" stroke-width="1.5"/>
          <!-- Buckle -->
          <rect x="38" y="106" width="14" height="4" rx="1" fill="var(--accent)" opacity="0.7"/>
          <!-- Left arm (raised, blocking) -->
          <rect x="-10" y="58" width="24" height="14" rx="7" fill="var(--accent)" opacity="0.9">
            <animateTransform attributeName="transform" type="rotate" values="-10,-10,65;10,-10,65;-10,-10,65" dur="2s" repeatCount="indefinite"/>
          </rect>
          <!-- Right arm -->
          <rect x="76" y="66" width="22" height="14" rx="7" fill="var(--accent)" opacity="0.9"/>
          <!-- Legs -->
          <rect x="22" y="112" width="20" height="32" rx="6" fill="var(--bg-card)" stroke="var(--border)" stroke-width="2"/>
          <rect x="48" y="112" width="20" height="32" rx="6" fill="var(--bg-card)" stroke="var(--border)" stroke-width="2"/>
          <!-- Boots -->
          <rect x="18" y="138" width="26" height="10" rx="4" fill="var(--bg-secondary)" stroke="var(--border)" stroke-width="1.5"/>
          <rect x="46" y="138" width="26" height="10" rx="4" fill="var(--bg-secondary)" stroke="var(--border)" stroke-width="1.5"/>
          <!-- Shield (held out) -->
          <path d="M-22 55 L-6 55 L-6 78 L-14 84 L-22 78 Z" fill="var(--bg-card)" stroke="var(--border)" stroke-width="2">
            <animateTransform attributeName="transform" type="rotate" values="-10,-14,70;10,-14,70;-10,-14,70" dur="2s" repeatCount="indefinite"/>
          </path>
          <text x="-14" y="69" text-anchor="middle" font-size="10" fill="var(--error,#c0392b)" font-weight="bold">🚫</text>
        </svg>
      </div>

      <!-- Ground -->
      <div class="ground"></div>
    </div>

    <p class="error-code">Error 403 — Forbidden</p>
    <h1 class="error-title">Halt! You can't go there</h1>
    <p class="error-body">
      Our stern guard says this area is off-limits for you.
      You don't have permission to access this page. Please log in with the right account or go back.
    </p>

    <div class="error-actions">
      <a href="/login.html"    class="btn btn-primary btn-lg">🔑 Log In</a>
      <a href="/dashboard.html" class="btn btn-ghost btn-lg">🏠 Dashboard</a>
      <a href="javascript:history.back()" class="btn btn-ghost btn-lg">← Back</a>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
